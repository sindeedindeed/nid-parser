<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NID Intake</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ink: #0E1526;
            --ink-soft: #16203A;
            --paper: #F6F1E3;
            --paper-dim: #EAE3D0;
            --teal: #1C7C74;
            --teal-bright: #29A296;
            --gold: #B8892B;
            --text-dark: #171410;
            --text-mute: #6B6455;
            --line: rgba(23, 20, 16, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--ink);
            color: var(--paper);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Guilloché-style security pattern, faint, behind everything */
        .weave {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.16;
            pointer-events: none;
        }

        .stage {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 620px;
        }

        .mark {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 34px;
        }

        .mark svg {
            flex-shrink: 0;
        }

        .mark-text .eyebrow {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--teal-bright);
            margin: 0 0 4px;
        }

        .mark-text h1 {
            font-family: 'Fraunces', serif;
            font-weight: 500;
            font-size: 1.9rem;
            letter-spacing: -0.01em;
            margin: 0;
            color: var(--paper);
        }

        .card {
            background: var(--paper);
            border-radius: 6px;
            padding: 40px;
            color: var(--text-dark);
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.55);
        }

        .card p.lede {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem;
            color: var(--text-mute);
            margin: 0 0 28px;
            letter-spacing: 0.01em;
        }

        .dropzones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 28px;
        }

        .drop {
            position: relative;
            border: 1.5px dashed var(--line);
            border-radius: 4px;
            aspect-ratio: 4 / 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: border-color 0.2s ease, background-color 0.2s ease;
            background: rgba(255, 255, 255, 0.35);
            overflow: hidden;
            text-align: center;
            padding: 12px;
        }

        .drop:hover,
        .drop.drag {
            border-color: var(--teal);
            background: rgba(28, 124, 116, 0.06);
        }

        .drop.filled {
            border-style: solid;
            border-color: var(--teal);
        }

        .drop input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .drop svg {
            color: var(--text-mute);
            transition: color 0.2s ease;
        }

        .drop:hover svg {
            color: var(--teal);
        }

        .drop .side {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-mute);
        }

        .drop .hint {
            font-size: 0.72rem;
            color: var(--text-mute);
        }

        .drop img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .drop .badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--teal);
            color: var(--paper);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.62rem;
            padding: 3px 7px;
            border-radius: 3px;
            letter-spacing: 0.06em;
            z-index: 2;
        }

        button.submit {
            width: 100%;
            padding: 15px 18px;
            background: var(--ink);
            color: var(--paper);
            border: none;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s ease, transform 0.08s ease;
        }

        button.submit:hover {
            background: var(--teal);
        }

        button.submit:active {
            transform: scale(0.99);
        }

        button.submit:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        button.submit .arrow {
            transition: transform 0.2s ease;
        }

        button.submit:hover .arrow {
            transform: translateX(3px);
        }

        #status {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem;
            text-align: center;
            margin-top: 18px;
            color: var(--text-mute);
            min-height: 1em;
        }

        #status.loading {
            color: var(--teal);
        }

        #status.err {
            color: #B23A2E;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.35;
            }
        }

        .loading {
            animation: pulse 1.3s infinite;
        }

        pre {
            background: var(--paper-dim);
            border-left: 3px solid var(--teal);
            border-radius: 2px;
            padding: 16px 18px;
            overflow-x: auto;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem;
            line-height: 1.5;
            display: none;
            margin-top: 20px;
            color: var(--text-dark);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: slideUp 0.35s ease-out forwards;
        }

        @media (max-width: 480px) {
            .card {
                padding: 28px 22px;
            }

            .dropzones {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .loading,
            .fade-in {
                animation: none;
            }
        }

        button.submit:focus-visible,
        .drop:focus-within {
            outline: 2px solid var(--teal-bright);
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <svg class="weave" preserveAspectRatio="xMidYMid slice" viewBox="0 0 800 800">
        <defs>
            <pattern id="waves" width="80" height="80" patternUnits="userSpaceOnUse">
                <path d="M0 40 Q 20 0 40 40 T 80 40" fill="none" stroke="#29A296" stroke-width="0.6" />
                <path d="M0 20 Q 20 -20 40 20 T 80 20" fill="none" stroke="#B8892B" stroke-width="0.4" />
                <path d="M0 60 Q 20 20 40 60 T 80 60" fill="none" stroke="#29A296" stroke-width="0.4" />
            </pattern>
        </defs>
        <rect width="800" height="800" fill="url(#waves)" />
    </svg>

    <div class="stage">
        <div class="mark">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="18.5" stroke="#29A296" stroke-width="1" />
                <circle cx="20" cy="20" r="13.5" stroke="#B8892B" stroke-width="0.75" />
                <circle cx="20" cy="20" r="4" fill="#29A296" />
            </svg>
            <div class="mark-text">
                <h1>Check NID Details</h1>
            </div>
        </div>

        <div class="card">
            <p class="lede">Please upload both front and back sides separately.</p>

            <form id="uploadForm">
                <div class="dropzones">
                    <label class="drop" id="dropFront" for="front">
                        <span class="badge" style="display:none;">Front added</span>
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <rect x="3" y="5" width="18" height="14" rx="2" />
                            <circle cx="9" cy="10" r="2" />
                            <path d="M21 16l-5-5-4 4-3-3-6 6" />
                        </svg>
                        <span class="side">Front</span>
                        <span class="hint">Click or drop image</span>
                        <input type="file" id="front" accept="image/*" required>
                    </label>

                    <label class="drop" id="dropBack" for="back">
                        <span class="badge" style="display:none;">Back added</span>
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <rect x="3" y="5" width="18" height="14" rx="2" />
                            <circle cx="9" cy="10" r="2" />
                            <path d="M21 16l-5-5-4 4-3-3-6 6" />
                        </svg>
                        <span class="side">Back</span>
                        <span class="hint">Click or drop image</span>
                        <input type="file" id="back" accept="image/*" required>
                    </label>
                </div>

                <button type="submit" class="submit">
                    <span>Parse ID</span>
                    <span class="arrow">→</span>
                </button>
            </form>

            <div id="status"></div>
            <pre id="result"></pre>
        </div>
    </div>

    <script>
        function wireDrop(dropId, inputId) {
            const drop = document.getElementById(dropId);
            const input = document.getElementById(inputId);
            const badge = drop.querySelector('.badge');

            const showPreview = (file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    let img = drop.querySelector('img');
                    if (!img) {
                        img = document.createElement('img');
                        drop.prepend(img);
                    }
                    img.src = e.target.result;
                    drop.classList.add('filled');
                    badge.style.display = 'inline-block';
                };
                reader.readAsDataURL(file);
            };

            input.addEventListener('change', () => showPreview(input.files[0]));

            ['dragover', 'dragleave', 'drop'].forEach(evt => {
                drop.addEventListener(evt, (e) => {
                    e.preventDefault();
                    if (evt === 'dragover') drop.classList.add('drag');
                    else drop.classList.remove('drag');
                });
            });

            drop.addEventListener('drop', (e) => {
                const file = e.dataTransfer.files[0];
                if (file) {
                    input.files = e.dataTransfer.files;
                    showPreview(file);
                }
            });
        }

        wireDrop('dropFront', 'front');
        wireDrop('dropBack', 'back');

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const statusEl = document.getElementById('status');
            const resultEl = document.getElementById('result');
            const submitBtn = e.target.querySelector('button.submit');

            statusEl.textContent = 'Reading document…';
            statusEl.className = 'loading';
            resultEl.style.display = 'none';
            resultEl.className = '';
            submitBtn.disabled = true;

            const formData = new FormData();
            formData.append('front_image', document.getElementById('front').files[0]);
            formData.append('back_image', document.getElementById('back').files[0]);

            try {
                const response = await fetch('/parse-nid', { method: 'POST', body: formData });
                const data = await response.json();

                statusEl.className = '';
                statusEl.textContent = response.ok ? 'Done' : 'Something went wrong';
                if (!response.ok) statusEl.className = 'err';

                resultEl.textContent = JSON.stringify(data, null, 2);
                resultEl.style.display = 'block';
                void resultEl.offsetWidth;
                resultEl.className = 'fade-in';
            } catch (err) {
                statusEl.className = 'err';
                statusEl.textContent = 'Could not reach the server.';
            } finally {
                submitBtn.disabled = false;
            }
        };
    </script>
</body>

</html>
